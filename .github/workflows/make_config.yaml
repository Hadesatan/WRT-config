name: OpenWrt Config Only (No Build)

on:
  workflow_dispatch:        # 手动触发
    inputs:
      enable_ssh:
        description: 'Enable SSH for make menuconfig'
        type: boolean
        default: true

jobs:
  config:
    runs-on: ubuntu-22.04
    permissions:
      contents: write        # 允许创建 Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 make menuconfig 所需的依赖（不需要完整编译工具链）
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git libncurses-dev gawk flex bison build-essential \
          python3-distutils rsync unzip wget

      # 克隆 OpenWrt 源码（以 Lean's LEDE 为例）
      - name: Clone OpenWrt source
        run: |
          git clone https://github.com/LiBwrt/Libwrt openwrt
          cd openwrt
          sed -i '$a src-git kiddin9 https://github.com/kiddin9/op-packages.git;main' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cd ../config
          LATEST_FILE=$(ls -v config_*.txt 2>/dev/null | tail -n 1)
          if [ -z "$LATEST_FILE" ]; then
             echo "错误：LATEST_FILE 环境变量为空"
            exit 1
          fi
          cp "$LATEST_FILE" ../openwrt/.config

      # SSH 连接，您将在此手动执行 make menuconfig
      - name: SSH session for menuconfig
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 300

      # 导出最终的 .config 文件
      - name: Collect config file
        run: |
          cd openwrt
          # 如果 .config 存在，则复制到工作区
          if [ -f .config ]; then
            ./scripts/diffconfig.sh > config.seed
            cp config.seed ../config_$(date +%Y%m%d_%H%M%S).txt
            cp config.seed ../config/config_$(date +%Y%m%d_%H%M%S).txt
            LATEST_FILE="config/config_$(date +%Y%m%d_%H%M%S).txt"
            echo "LATEST_FILE="config/config_$(date +%Y%m%d_%H%M%S).txt"" >> $GITHUB_ENV
          else
            echo "No .config found, exiting"
            exit 1
          fi
      - name: Create Git Tag
        id: tag
        run: |
          TAG_NAME="config-$(date +%Y%m%d-%H%M%S)"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: 提交并推送到仓库
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "自动化：复制并更新配置文件"
          file_pattern: ${{ env.LATEST_FILE }} # 仅指定需要提交的文件
          push_options: '--force' # 有冲突时可强制覆盖（慎用）
    
      # 创建 Release 并上传 .config 文件
      - name: Create Release and upload config
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: "OpenWrt Config ${{ steps.tag.outputs.tag_name }}"
          body: "通过 make menuconfig 生成的配置文件（未编译固件）"
          files: config_*.txt
          draft: false
          prerelease: false
