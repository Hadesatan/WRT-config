name: OpenWrt Config Only (No Build)

on:
  workflow_dispatch:        # 手动触发
    inputs:
      enable_ssh:
        description: 'Enable SSH for make menuconfig'
        type: boolean
        default: true

jobs:
  config:
    runs-on: ubuntu-22.04
    permissions:
      contents: write        # 允许创建 Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 make menuconfig 所需的依赖（不需要完整编译工具链）
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git libncurses-dev gawk flex bison build-essential \
          python3-distutils rsync unzip wget

      # 克隆 OpenWrt 源码（以 Lean's LEDE 为例）
      - name: Clone OpenWrt source
        run: |
          git clone https://github.com/LiBwrt/Libwrt openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # SSH 连接，您将在此手动执行 make menuconfig
      - name: SSH session for menuconfig
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 300
        with:
          limit-access-to-actor: true

      # 导出最终的 .config 文件
      - name: Collect config file
        run: |
          cd openwrt
          # 如果 .config 存在，则复制到工作区
          if [ -f .config ]; then
            cp .config ../config_$(date +%Y%m%d_%H%M%S).txt
          else
            echo "No .config found, exiting"
            exit 1
          fi

      # 创建 Release 并上传 .config 文件
      - name: Create Release and upload config
        uses: softprops/action-gh-release@v1
        with:
          tag_name: config-$(date +%Y%m%d-%H%M%S)
          name: "OpenWrt Config $(date +%Y%m%d-%H%M%S)"
          body: "通过 make menuconfig 生成的配置文件（未编译固件）"
          files: config_*.txt
          draft: false
          prerelease: false
